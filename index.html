<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paocai Novels</title>

<style>

body{
    background:#1b1a17;      /* 背景：柔和深灰咖啡色 */
    color:#f5eee6;           /* 文字：奶油米色 */
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif; /* 中文字体柔和 */
    padding:20px;
    margin:0;
    line-height:1.8;         /* 阅读舒适行距 */
    letter-spacing:0.3px;    /* 微调字间距 */
}

h1{
    text-align:center;
    margin-bottom:50px;
}

/* 大分类标题 */
.section-title{
    font-size:32px;
    margin-top:60px;
    margin-bottom:20px;
    border-left:6px solid #c58f7b; /* 左边线柔和米咖色 */
    padding-left:15px;
}

/* 小分类标题 */
.category-title{
    font-size:22px;
    margin-top:30px;
    margin-bottom:20px;
    color:#d8b08c; /* 分类标题柔和米色 */
}

.books{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
}

/* 小说卡片 */
.book{
    background:#2a2925; /* 卡片背景柔和深灰 */
    padding:15px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}

.book:hover{
    transform:translateY(-5px);
}

.book img{
    width:100%;
    border-radius:10px;
}

.book a{
    text-decoration:none;
    color:#f5eee6; /* 链接文字与整体文字一致 */
}

.button{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#c58f7b; /* 按钮柔和米咖色 */
    border-radius:8px;
    color:white;
    cursor:pointer;
}

p{
    color:#c9b8a5; /* 副文字：柔和浅米色 */
    line-height:1.6;
}

</style>

</head>

<h1>📚 Paocai Novels</h1>

</div>
